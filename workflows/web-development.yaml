name: web-development
description: Build web pages and frontend applications

channels:
  - name: general
    threads:
      - name: progress
      - name: artifacts

cards:
  - title: define-goal
    agents: [ferb-reviewer, ferb-user-proxy]
    outputs:
      - confirmed-goal

  - title: develop-plan
    agents: [ferb-worker, ferb-reviewer]
    inputs:
      - confirmed-goal
    outputs:
      - implementation-plan

  - title: create-artifact
    agents: [ferb-worker, ferb-reviewer]
    inputs:
      - confirmed-goal
      - implementation-plan
    outputs:
      - artifact

  - title: review-artifact
    agents: [ferb-reviewer, ferb-approver]
    inputs:
      - artifact
    outputs:
      - reviewed-artifact
