name: web-development
description: Build web pages and frontend applications

channels:
  - name: general
    threads:
      - name: progress
      - name: questions
      - name: artifacts

cards:
  - title: define-goal
    agents: [ferb-reviewer, ferb-user-proxy]
  - title: implementation
    agents: [ferb-worker, ferb-reviewer]
  - title: review
    agents: [ferb-reviewer, ferb-approver]

agents:
  - name: ferb-reviewer
    role: Reviews work, asks clarifying questions, approves artifacts
  - name: ferb-worker
    role: Implements the solution based on the goal
  - name: ferb-approver
    role: Final approval of completed work
  - name: ferb-user-proxy
    role: Answers questions on behalf of the user
