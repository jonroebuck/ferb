name: default
description: Bootstrap workflow - fetches target workflow and sets up board

steps:
  - name: fetch-workflow
    agent: ferb-moderator
    task: >
      fetch and validate the workflow file specified by --workflow flag.
      If no --workflow flag provided, prompt user to specify one.

  - name: setup-channels
    agent: ferb-moderator
    task: >
      read the fetched workflow and create all required channels and
      threads in Switchboard
    depends_on: fetch-workflow

  - name: setup-kanban
    agent: ferb-kanban-manager
    task: >
      read the fetched workflow and create all required kanban cards
      in Switchboard, assign agents to cards
    depends_on: fetch-workflow

  - name: handoff
    task: start the target workflow with channels and kanban board ready
    depends_on:
      - setup-channels
      - setup-kanban
